<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nyumbani</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

    <!-- Login Card -->
    <main class="auth-container">
        <div class="card auth-card">

            <!-- Brand Header -->
            <div class="brand-header">
                <h1>Nyumbani</h1>
                <p>Welcome back</p>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <!-- Error banner (hidden by default) -->
                <div id="error-message" class="error-hidden"></div>

                <!-- Submit button with loading support -->
                <button type="submit" id="btn-submit" class="btn-primary">Sign In</button>
            </form>

            <!-- Password Reset -->
            <div id="reset-section" style="display: none;">
                <div class="brand-header" style="margin-bottom: 1rem;">
                    <h2 style="font-size: 1.2rem; color: var(--text-main);">Reset Password</h2>
                    <p>Enter your email and we'll send a reset link</p>
                </div>
                <div class="input-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" placeholder="you@example.com" required>
                </div>
                <div id="reset-message" class="error-hidden"></div>
                <button type="button" id="reset-btn" class="btn-primary">Send Reset Link</button>
                <div class="auth-footer" style="margin-top: 1rem;">
                    <p><a href="#" id="back-to-login">Back to Login</a></p>
                </div>
            </div>

            <!-- Footer links -->
            <div class="auth-footer">
                <p>New Tenant? <a href="register.html">Join Your House</a></p>
                <p><a href="#" id="forgot-password-link">Forgot password?</a></p>
            </div>

        </div>
    </main>

    <!-- Auth logic (ES module) -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
