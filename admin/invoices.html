<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices | Nyumbani</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="fa-solid fa-u"></i></div>
            NYUMBANI
        </div>
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="User">
            <div class="name" id="sidebar-username">admin</div>
            <i class="fa-solid fa-chevron-right text-muted"></i>
        </div>
        <div class="menu-section">
            <div class="menu-title">--- MAIN MENU</div>
            <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="houses.html" class="menu-item"><i class="fa-solid fa-building"></i> Houses</a>
            <a href="tenants.html" class="menu-item"><i class="fa-solid fa-users"></i> Tenants</a>
            <a href="invoices.html" class="menu-item active"><i class="fa-solid fa-credit-card"></i> Invoices</a>
            <a href="payments.html" class="menu-item"><i class="fa-solid fa-money-bill-wave"></i> Payments</a>
            <a href="messages.html" class="menu-item"><i class="fa-solid fa-envelope"></i> Messages</a>
            
            <div class="menu-title" style="margin-top: 1.5rem;">--- OTHER</div>
            <a href="#" class="menu-item"><i class="fa-solid fa-gear"></i> Accounts</a>
            <a href="#" id="logout-btn" class="menu-item"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log out</a>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <i class="fa-solid fa-circle-arrow-left" style="font-size: 1.2rem; cursor: pointer;"></i>
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass" style="color: #333;"></i>
                </div>
            </div>
            <div class="topbar-right">
                <i class="fa-solid fa-gear" style="font-size: 1.2rem; cursor: pointer;"></i>
            </div>
        </header>

        <main class="content-area">
            <div class="page-header">
                <div class="page-title">Manage Invoices</div>
                <div class="breadcrumbs">
                    <a href="dashboard.html">Dashboard</a> / <span>Invoices</span>
                </div>
            </div>

            <!-- Generate Invoice Form -->
            <div class="white-card">
                <h3 class="card-title">Generate New Invoice</h3>
                <form id="generate-invoice-form" style="display: flex; gap: 1.5rem; align-items: flex-end;">
                    <div class="form-group" style="flex: 1;">
                        <label>Select Tenant</label>
                        <select id="invoice-tenant" class="form-control" required>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Amount (KES)</label>
                        <input type="number" id="invoice-amount" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Due Date</label>
                        <input type="date" id="invoice-date" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="height: 45px;">Generate</button>
                </form>
            </div>

            <div class="white-card">
                <div class="card-title">ALL INVOICES</div>
                <table class="data-table">
                    <thead>
                        <tr style="background: #f4f6f9;">
                            <th>Tenant</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="invoices-list-body">
                        <!-- Injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script type="module" src="invoices.js"></script>
</body>
</html>
