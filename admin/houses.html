<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houses | Nyumbani</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon"><i class="fa-solid fa-u"></i></div>
            NYUMBANI
        </div>
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="User">
            <div class="name" id="sidebar-username">admin</div>
            <i class="fa-solid fa-chevron-right text-muted"></i>
        </div>
        <div class="menu-section">
            <div class="menu-title">--- MAIN MENU</div>
            <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            
            <a href="houses.html" class="menu-item active"><i class="fa-solid fa-building"></i> Houses</a>
            <a href="tenants.html" class="menu-item"><i class="fa-solid fa-users"></i> Tenants</a>
            <a href="invoices.html" class="menu-item"><i class="fa-solid fa-credit-card"></i> Invoices</a>
            <a href="payments.html" class="menu-item"><i class="fa-solid fa-money-bill-wave"></i> Payments</a>
            <a href="messages.html" class="menu-item"><i class="fa-solid fa-envelope"></i> Messages</a>
            
            <div class="menu-title" style="margin-top: 1.5rem;">--- OTHER</div>
            <a href="#" class="menu-item"><i class="fa-solid fa-gear"></i> Accounts</a>
            <a href="#" id="logout-btn" class="menu-item"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log out</a>
        </div>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <i class="fa-solid fa-circle-arrow-left" style="font-size: 1.2rem; cursor: pointer;"></i>
                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass" style="color: #333;"></i>
                </div>
            </div>
            <div class="topbar-right">
                <i class="fa-solid fa-gear" style="font-size: 1.2rem; cursor: pointer;"></i>
            </div>
        </header>

        <!-- Content Area -->
        <main class="content-area">
            <div class="page-header">
                <div class="page-title">Manage Houses</div>
                <div class="breadcrumbs">
                    <a href="dashboard.html">Dashboard</a> / <span>Houses</span>
                </div>
            </div>

            <!-- Add House Form -->
            <div class="white-card">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; text-transform: uppercase; font-weight: 600;">
                    <i class="fa-solid fa-building" style="font-size: 1.5rem;"></i> ADD A NEW HOUSE
                </div>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Fill in the form below:</p>
                
                <form id="add-house-form">
                    <div class="form-group">
                        <label>House Name: *</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-pen"></i>
                            <input type="text" id="house-name" class="form-control" placeholder="Enter house name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Rent amount (KES): *</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-money-bill"></i>
                            <input type="number" id="house-rent" class="form-control" placeholder="e.g. 15000" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Secret Code (For Tenant): *</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-key"></i>
                            <input type="text" id="house-code" class="form-control" placeholder="e.g. ROOM-1-KEY" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success" style="padding: 0.75rem 2rem; font-size: 1rem;"><i class="fa-solid fa-plus-circle"></i> Add this house</button>
                </form>
            </div>

            <!-- Properties List -->
            <div class="white-card">
                <div class="card-title">CURRENT HOUSE LISTINGS</div>
                <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Export data to Copy, CSV, Excel, PDF & Print</div>
                
                <div class="btn-group" style="margin-bottom: 1.5rem;">
                    <button class="btn">Copy</button>
                    <button class="btn">CSV</button>
                    <button class="btn">Excel</button>
                    <button class="btn">PDF</button>
                    <button class="btn">Print</button>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr style="background: #f4f6f9;">
                                <th>House Name <i class="fa-solid fa-sort"></i></th>
                                <th>Secret Code <i class="fa-solid fa-sort"></i></th>
                                <th>Rent Amount <i class="fa-solid fa-sort"></i></th>
                                <th>Status <i class="fa-solid fa-sort"></i></th>
                            </tr>
                        </thead>
                        <tbody id="house-list-body">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script type="module" src="houses.js"></script>
</body>
</html>
