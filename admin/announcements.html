<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements | Nyumbani</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="../favicon.png" type="image/png">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fa-solid fa-u"></i></div>
                <span id="logo-text">NYUMBANI</span>
            </div>
            <div class="user-profile">
                <img src="https://ui-avatars.com/api/?name=Admin&background=4361ee&color=fff" alt="User" id="sidebar-avatar">
                <div class="name" id="sidebar-username">Admin</div>
                <i class="fa-solid fa-chevron-right text-muted"></i>
            </div>
            <div class="menu-section">
                <div class="menu-title">MAIN MENU</div>
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-gauge"></i> Dashboard</a>
                <a href="houses.html" class="menu-item"><i class="fa-solid fa-building"></i> Houses</a>
                <a href="tenants.html" class="menu-item"><i class="fa-solid fa-users"></i> Tenants</a>
                <a href="payments.html" class="menu-item"><i class="fa-solid fa-money-bill-wave"></i> Payments <span class="badge badge-pending" id="badge-payments" style="display: none; margin-left: auto;">0</span></a>
                <a href="announcements.html" class="menu-item active"><i class="fa-solid fa-bullhorn"></i> Announcements</a>
                <a href="maintenance.html" class="menu-item"><i class="fa-solid fa-wrench"></i> Maintenance <span class="badge badge-pending" id="badge-maintenance" style="display: none; margin-left: auto;">0</span></a>
                <a href="messages.html" class="menu-item"><i class="fa-solid fa-envelope"></i> Messages <span class="badge badge-pending" id="badge-messages" style="display: none; margin-left: auto;">0</span></a>
                <a href="directory.html" class="menu-item"><i class="fa-solid fa-address-book"></i> Referrals Directory</a>
                <div class="menu-title" style="margin-top: 1.5rem;">OTHER</div>
                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
                <a href="#" id="logout-btn" class="menu-item"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log out</a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle"><i class="fa-solid fa-bars"></i></button>
                    <div class="search-bar">
                        <input type="text" placeholder="Search...">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>
                <div class="topbar-right">
                    <i class="fa-solid fa-gear" style="font-size: 1.2rem; cursor: pointer;"></i>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content-area">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Announcements</h1>
                        <div class="breadcrumbs">
                            <a href="dashboard.html">Home</a> / <span>Announcements</span>
                        </div>
                    </div>
                </div>

                <div class="flex-between" style="margin-bottom: 1.25rem;">
                    <div class="card-title" style="margin-bottom: 0;">All Announcements</div>
                    <button class="btn btn-primary" id="new-announcement-btn">
                        <i class="fa-solid fa-plus"></i> New Announcement
                    </button>
                </div>

                <div id="announcements-container">
                    <div class="loading-overlay">
                        <div class="spinner spinner-dark"></div>
                        Loading announcements...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create / Edit Announcement Modal -->
    <div class="modal-overlay" id="announcement-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="ann-modal-title">New Announcement</h3>
                <button class="modal-close" id="close-ann-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="ann-edit-id" value="">
                <div class="form-group">
                    <label for="ann-title-input">Title</label>
                    <input type="text" class="form-control" id="ann-title-input" placeholder="Announcement title" required>
                </div>
                <div class="form-group">
                    <label for="ann-message-input">Message</label>
                    <textarea class="form-control" id="ann-message-input" placeholder="Write your announcement..." required></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancel-ann-modal">Cancel</button>
                <button class="btn btn-primary" id="ann-submit-btn">
                    <i class="fa-solid fa-paper-plane"></i> Publish
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="announcements.js"></script>
</body>
</html>
