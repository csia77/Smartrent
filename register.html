<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Nyumbani</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>

    <!-- Registration Card -->
    <main class="auth-container">
        <div class="card auth-card">

            <!-- Brand Header -->
            <div class="brand-header">
                <h1>Nyumbani</h1>
                <p>Join your house</p>
            </div>

            <!-- Registration Form -->
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="example@gmail.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-code">House Code (From Landlord)</label>
                    <input type="text" id="reg-code" placeholder="e.g. ROOM-1-KEY" required>
                    <small class="input-hint">Ask your caretaker for this code.</small>
                </div>

                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password" required minlength="6">
                </div>

                <!-- Error banner (hidden by default) -->
                <div id="error-message" class="error-hidden"></div>

                <!-- Submit button with loading support -->
                <button type="submit" id="btn-submit" class="btn-primary">Register &amp; Join</button>
            </form>

            <!-- Footer link back to login -->
            <div class="auth-footer">
                <p>Already have an account? <a href="index.html">Login here</a></p>
            </div>

        </div>
    </main>

    <!-- Registration logic (ES module) -->
    <script type="module" src="js/register.js"></script>
</body>
</html>
